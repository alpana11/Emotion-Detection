<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emotion AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

/* BODY */
body {
    background: linear-gradient(135deg, #eef2ff, #fdf2f8);
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 18px 40px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(12px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
}

.navbar h2 {
    font-weight: 700;
    background: linear-gradient(135deg, #6366f1, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.navbar button {
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.navbar button:hover {
    transform: scale(1.05);
}

/* MAIN */
.main {
    display: flex;
    justify-content: center;
    margin-top: 50px;
}

/* CARD */
.card {
    width: 90%;
    max-width: 900px;
    display: flex;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* LEFT */
.left {
    flex: 1;
    padding: 35px;
}

.left h1 {
    color: #1e293b;
    margin-bottom: 5px;
}

.left p {
    color: #64748b;
}

/* TEXTAREA */
textarea {
    width: 100%;
    height: 120px;
    margin-top: 15px;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #e2e8f0;
    outline: none;
    transition: 0.3s;
}

textarea:focus {
    border-color: #6366f1;
    box-shadow: 0 0 8px rgba(99,102,241,0.3);
}

/* BUTTON */
button.analyze {
    margin-top: 15px;
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #6366f1, #ec4899);
    color: white;
    font-weight: 500;
    cursor: pointer;
    transition: 0.3s;
}

button.analyze:hover {
    transform: scale(1.04);
    box-shadow: 0 8px 20px rgba(236,72,153,0.3);
}

/* FADE IN */
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
}

.card {
    animation: fadeInUp 0.5s ease both;
}

/* RESULT */
.result {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
}

@keyframes popIn {
    0%   { transform: scale(0.8); opacity: 0; }
    70%  { transform: scale(1.1); }
    100% { transform: scale(1);   opacity: 1; }
}

.result.show {
    animation: popIn 0.4s ease both;
}

/* SPINNER */
@keyframes spin {
    to { transform: rotate(360deg); }
}

.spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
}

/* RIGHT */
.right {
    flex: 1;
    padding: 35px;
    border-left: 1px solid #f1f5f9;
}

.right h3 {
    color: #1e293b;
    margin-bottom: 10px;
}

/* HISTORY */
.history-item {
    background: linear-gradient(135deg, #f1f5f9, #eef2ff);
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 8px;
    font-size: 14px;
    transition: 0.3s;
}

.history-item:hover {
    transform: translateX(5px);
    background: linear-gradient(135deg, #e0e7ff, #fce7f3);
}
</style>
</head>

<body>

<div class="navbar">
    <h2>Emotion AI</h2>
    <button onclick="goBack()">Logout</button>
</div>

<div class="main">
<div class="card">

    <!-- LEFT -->
    <div class="left">
        <h1>Analyze Feedback</h1>
        <p>Understand customer emotions instantly</p>

        <textarea id="review" placeholder="Try: 'Amazing product', 'Worst experience', 'It was okay'"></textarea>

        <button class="analyze" onclick="analyzeEmotion()">Analyze Feedback 🚀</button>

        <div class="result" id="result"></div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <h3>Recent Feedback</h3>
        <div id="history"></div>
    </div>

</div>
</div>

<script>
function goBack() {
    window.location.href = "login.html";
}

let history = [];

function updateHistory(text, emotion) {
    history.unshift(`${emotion} - ${text}`);
    if (history.length > 5) history.pop();
    const historyDiv = document.getElementById("history");
    historyDiv.innerHTML = history.map(item => `<div class="history-item">${item}</div>`).join("");
}

async function analyzeEmotion() {
    let text = document.getElementById("review").value;
    if (text.trim() === "") {
        alert("Please enter feedback");
        return;
    }

    let btn = document.querySelector("button.analyze");
    btn.innerHTML = "<span class='spinner'></span>Analyzing...";
    btn.disabled = true;

    let result = document.getElementById("result");
    result.className = "result";
    result.innerHTML = "Analyzing...";

    fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: text })
    })
    .then(res => res.json())
    .then(data => {
        let emotion = data.prediction;
        let color = emotion === "Happy" ? "green" :
                    emotion === "Angry" ? "red" : "orange";
        result.className = "result";
        result.style.color = color;
        let emoji = emotion === "Happy" ? "😊" : emotion === "Angry" ? "😡" : "😐";
        result.innerHTML = `${emoji} <strong>Emotion:</strong> ${emotion}<br><small>"${text}"</small>`;
        void result.offsetWidth;
        result.className = "result show";
        updateHistory(text, emotion);
    })
    .catch(() => {
        result.innerHTML = "⚠️ Could not connect to server.";
    })
    .finally(() => {
        btn.innerHTML = "Analyze Feedback 🚀";
        btn.disabled = false;
    });
}

function checkEmotion() {
    let text = document.getElementById("inputText").value;

    fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: text })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText = "Result: " + data.prediction;
    });
}


</script>

</body>
</html>
