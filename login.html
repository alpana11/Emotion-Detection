<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emotion Detection System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FONT AWESOME ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* BODY */
body {
    display: flex;
    height: 100vh;
}

/* LEFT SIDE */
.left {
    width: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2, #ff758c);
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px;
}

.left h1 {
    font-size: 42px;
    margin-bottom: 15px;
}

.left p {
    font-size: 18px;
    line-height: 1.6;
}

/* RIGHT SIDE */
.right {
    width: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f5f7fa;
}

/* FORM BOX */
.form-box {
    width: 80%;
    max-width: 400px;
}

/* HEADINGS */
h2 {
    margin-bottom: 20px;
    text-align: center;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #ddd;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #667eea, #ff758c);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* TOGGLE TEXT */
.toggle {
    margin-top: 10px;
    text-align: center;
    cursor: pointer;
    color: #555;
}

/* ROLE SECTION */
.role-section {
    display: none;
    text-align: center;
}

.roles {
    display: flex;
    gap: 20px;
    margin-top: 20px;
}

/* CARDS */
.role-card {
    flex: 1;
    padding: 25px;
    border-radius: 18px;
    color: white;
    cursor: pointer;
    transition: 0.4s;
    text-align: center;
}

.role-card:hover {
    transform: scale(1.08);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* CUSTOMER CARD */
.customer {
    background: linear-gradient(135deg, #36d1dc, #5b86e5);
}

/* OWNER CARD */
.owner {
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
}

/* ICON STYLE */
.icon {
    font-size: 40px;
    margin-bottom: 10px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    body {
        flex-direction: column;
    }

    .left, .right {
        width: 100%;
    }

    .roles {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<!-- LEFT SIDE -->
<div class="left">
    <h1>Emotion AI 💡</h1>
    <p>
        Transform customer feedback into meaningful insights using Machine Learning.
        Detect emotions like Happy, Neutral, and Angry instantly.
    </p>
</div>

<!-- RIGHT SIDE -->
<div class="right">
    <div class="form-box">

        <!-- LOGIN -->
        <div id="loginForm">
            <h2>Login</h2>
            <input type="text" placeholder="Username">
            <input type="password" placeholder="Password">
            <button onclick="login()">Login</button>
            <div class="toggle" onclick="showSignup()">Don't have an account? Sign up</div>
        </div>

        <!-- SIGNUP -->
        <div id="signupForm" style="display:none;">
            <h2>Sign Up</h2>
            <input type="text" placeholder="Username">
            <input type="password" placeholder="Password">
            <button onclick="signup()">Create Account</button>
            <div class="toggle" onclick="showLogin()">Already have an account? Login</div>
        </div>

        <!-- ROLE SELECTION -->
        <div class="role-section" id="roleSection">
            <h2>Select Role</h2>

            <div class="roles">

                <!-- CUSTOMER -->
                <div class="role-card customer" onclick="goCustomer()">
                    <div class="icon">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <h3>Customer</h3>
                    <p>Give Feedback</p>
                </div>

                <!-- OWNER -->
                <div class="role-card owner" onclick="goOwner()">
                    <div class="icon">
                        <i class="fa-solid fa-chart-line"></i>
                    </div>
                    <h3>Owner</h3>
                    <p>View Analysis</p>
                </div>

            </div>
        </div>

    </div>
</div>

<script>
function showSignup() {
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("signupForm").style.display = "block";
}

function showLogin() {
    document.getElementById("signupForm").style.display = "none";
    document.getElementById("loginForm").style.display = "block";
}

function login() {
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("roleSection").style.display = "block";
}

function signup() {
    alert("Account created successfully!");
    showLogin();
}

function goCustomer() {
    window.location.href = "index.html"; // your emotion page
}

function goOwner() {
    window.location.href = "dashboard.html"; // your dashboard
}
</script>

</body>
</html>
