<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Owner Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Inter', sans-serif;
    margin: 0;
    background: #f8fafc;
}

/* NAVBAR */
.navbar {
    padding: 15px 40px;
    background: linear-gradient(135deg,#6366f1,#ec4899);
    color: white;
    display: flex;
    justify-content: space-between;
}

/* CONTAINER */
.container {
    padding: 30px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: white;
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

/* TITLE */
h3 {
    margin-bottom: 10px;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

td {
    padding: 8px;
    border-bottom: 1px solid #eee;
}

/* BADGES */
.badge {
    padding: 4px 10px;
    border-radius: 10px;
    color: white;
    font-size: 12px;
}

.happy { background: #22c55e; }
.neutral { background: #f59e0b; }
.angry { background: #ef4444; }
</style>
</head>

<body>

<div class="navbar">
    <h2>Owner Dashboard</h2>
    <button onclick="goBack()">Logout</button>
</div>

<div class="container">

    <!-- SUMMARY -->
    <div class="grid">

        <div class="card">
            <h3>Total Reviews</h3>
            <h2 id="total"></h2>
        </div>

        <div class="card">
            <h3>Happy %</h3>
            <h2 id="happy"></h2>
        </div>

        <div class="card">
            <h3>Neutral %</h3>
            <h2 id="neutral"></h2>
        </div>

        <div class="card">
            <h3>Angry %</h3>
            <h2 id="angry"></h2>
        </div>

    </div>

    <!-- CHART -->
    <div class="card">
        <h3>Feature Comparison</h3>
        <canvas id="chart"></canvas>
    </div>

    <!-- INSIGHTS -->
    <div class="card">
        <h3>Insights</h3>
        <p id="insight"></p>
    </div>

    <!-- TABLE -->
    <div class="card">
        <h3>Recent Feedback</h3>
        <table id="table"></table>
    </div>

</div>

<script>
function goBack() {
    window.location.href = "login.html";
}

let data = JSON.parse(localStorage.getItem("h")) || [];

let total = data.length;
let count = {Happy:0, Neutral:0, Angry:0};

data.forEach(d => count[d.emotion]++);

let hp = total ? Math.round(count.Happy/total*100) : 0;
let np = total ? Math.round(count.Neutral/total*100) : 0;
let ap = total ? Math.round(count.Angry/total*100) : 0;

/* SHOW SUMMARY */
document.getElementById("total").innerText = total;
document.getElementById("happy").innerText = hp + "%";
document.getElementById("neutral").innerText = np + "%";
document.getElementById("angry").innerText = ap + "%";

/* FEATURES */
let features = ["camera","battery","ram"];

let scores = [];

features.forEach(f => {
    let pos = 0, totalF = 0;

    data.forEach(d => {
        if (d.text.toLowerCase().includes(f)) {
            totalF++;
            if (d.emotion === "Happy") pos++;
        }
    });

    scores.push(totalF ? Math.round(pos/totalF*100) : 0);
});

/* CHART */
new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
        labels: features,
        datasets: [{
            label: "Satisfaction %",
            data: scores
        }]
    }
});

/* INSIGHT */
let max = Math.max(...scores);
let min = Math.min(...scores);

let best = features[scores.indexOf(max)];
let worst = features[scores.indexOf(min)];

document.getElementById("insight").innerText =
    "Best feature: " + best.toUpperCase() +
    " | Needs improvement: " + worst.toUpperCase();

/* TABLE */
let table = document.getElementById("table");

data.slice(0,5).forEach(d => {
    let row = document.createElement("tr");

    row.innerHTML = `
        <td>${d.text}</td>
        <td><span class="badge ${d.emotion.toLowerCase()}">${d.emotion}</span></td>
    `;

    table.appendChild(row);
});
</script>

</body>
</html>
